#Workflow for GitHub Actions

name: owamp-workflow
 
on: 
  workflow_dispatch:
    inputs: 
      OS:
        description: 'OS to build on'
        required: true
      BUILD_VARS_JSON:
        description: 'Build var json file'
        required: true
  workflow_run:
    workflows: "Build owamp artifacts and pass runid"
    branches: 'github-workflow'
    types:
      - completed      
 
jobs:
       
  build-owamp:

 
    runs-on: ubuntu-latest

    steps:
        - name: Check out Repo
          uses: actions/checkout@v4
          with:
            ref: 5.2.0
        
        - name: Pretty-print BUILD_VARS_JSON
          run: |
            echo '${{ github.event.inputs.BUILD_VARS_JSON }}'
            
        - name: Extract dependencies of pscheduler
          id: extract_deps
          run: |
            echo '${{ github.event.inputs.BUILD_VARS_JSON }}' | jq -r '.repos[] | select(.name == "owamp") | .deps[]' > deps.txt
            echo "Dependencies:"
            cat deps.txt

        - name: Set dependencies as outputs
          id: set_deps
          run: |
            DEPS=$(cat deps.txt)
            echo "DEPS=$DEPS" >> $GITHUB_ENV

        - name: Download artifacts
          run: |
            while IFS= read -r repo; do
              echo "Downloading artifact for $repo"
              run_id=$(echo '${{ github.event.inputs.BUILD_VARS_JSON }}' | jq -r ".buildids | .[\"$repo\"]")
              echo "rund id $run_id"
              mkdir -p artifacts
              gh run download $run_id --repo cs1867/$repo -D artifacts --name "$repo-${{ github.event.inputs.OS }}"
            done < deps.txt
          env:
            GITHUB_TOKEN: ${{ secrets.GIT_ACTIONS }}

        - name: Download artifacts
          run: |     
            ls artifacts
        # github-actions-workflow.sh
        - name: run docker oneshot builder and github-actions-workflow.sh
          run: |
           curl -s https://raw.githubusercontent.com/perfsonar/docker-oneshot-builder/main/build | sh -s - --run github-workflow.sh . '${{ github.event.inputs.OS }}'  
           
        - uses: actions/upload-artifact@v3
          with:
            name: ${{ github.event.repository.name }}-${{ github.event.inputs.OS }}
            path: unibuild-repo
            #Don't keep these for long.  This is just a test.
            retention-days: 5
         
